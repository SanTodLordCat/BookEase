<!DOCTYPE html>
<html>
<head>

    <title>UniCafe Smart Ordering System</title>

    <link rel="stylesheet" href="css/style.css">

</head>

<body>

    <!-- NAVIGATION -->

    <nav class="navbar">

        <div class="logo">
            UniCafe
        </div>

        <ul class="nav-links">

            <li><a href="index.html">Home</a></li>

            <li><a href="about.html">About</a></li>

            <li><a href="contact.html">Contact</a></li>

        </ul>

    </nav>

    <!-- HERO -->

    <section class="hero">


        <h1>UniCafe Smart Ordering System</h1>

        <p>
            Skip the queue and order food online from your favourite campus cafe.
        </p>

        <a href="#cafes" class="btn">
            Start Ordering
        </a>

    </section>

    <!-- CAFE SELECTION -->

    <section class="section" id="cafes">

        <h2 align="center">Choose Your Cafe</h2>

        <br><br>

        <div class="card-container">

            <div class="card">

                <img src="images/cafeapple.jpeg">

                <h3>Cafe Apple</h3>

                <button class="btn"
                    onclick="selectCafe('Cafe Apple')">
                    View Menu
                </button>

            </div>

            <div class="card">

                <img src="images/cafe-manga.jpg">

                <h3>Cafe Manga</h3>

                <button class="btn"
                    onclick="selectCafe('Cafe Manga')">
                    View Menu
                </button>

            </div>

            <div class="card">

                <img src="images/cafeKesinai.jpeg">

                <h3>Cafe Kesinai</h3>

                <button class="btn"
                    onclick="selectCafe('Cafe Kesinai')">
                    View Menu
                </button>

            </div>

            <div class="card">

                <img src="images/anjung-siswi.jpg">

                <h3>Anjung Siswi</h3>

                <button class="btn"
                    onclick="selectCafe('Anjung Siswi')">
                    View Menu
                </button>

            </div>

            <div class="card">

                <img src="images/anjung-siswa.jpg">

                <h3>Anjung Siswa</h3>

                <button class="btn"
                    onclick="selectCafe('Anjung Siswa')">
                    View Menu
                </button>

            </div>

        </div>

    </section>

    <footer>

        © 2026 UniCafe Smart Ordering System

    </footer>

<script src="js/script.js"></script>

</body>
</html>
